<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapFácil Pro | Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: #f1f5f9; color: #334155; }

        /* HEADER PREMIUM */
        header {
            background-color: #ffffff;
            border-bottom: 1px solid #e2e8f0;
            padding: 15px 20px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.05);
        }
        .header-container { max-width: 1200px; margin: 0 auto; display: flex; align-items: center; gap: 20px; }
        .logo-premium { height: 50px; object-fit: contain; }
        .brand-title { font-weight: 800; color: #1e293b; font-size: 1.2rem; }

        /* LOGIN PREMIUM */
        .login-wrapper {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 80vh;
        }
        .card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .logo-login { max-width: 220px; margin-bottom: 25px; }
        .input-field {
            width: 100%;
            padding: 12px;
            margin: 10px 0;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #f8fafc;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #059669;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
        }
        .btn-login:hover { background-color: #047857; }
    </style>
</head>
<body>

    <header>
        <div class="header-container">
            <img src="pro sem fundo.png" alt="ZapFácil Pro" class="logo-premium">
            <span class="brand-title">| Painel Premium</span>
        </div>
    </header>

    <div class="login-wrapper">
        <div class="card">
            <img src="pro sem fundo.png" alt="ZapFácil Pro" class="logo-login">
            <input type="text" class="input-field" placeholder="Chave de Ativação">
            <button class="btn-login">ACESSAR SISTEMA</button>
        </div>
    </div>

</body>
</html>
