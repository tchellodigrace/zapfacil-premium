<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ZapFácil Pro - ERP Mobile (PREMIUM)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        .quebra-texto-cupom { white-space: normal !important; word-break: break-word !important; overflow-wrap: anywhere; }
        #bloqueioAssinatura {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 99999;
            color: white;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body class="bg-gray-100 text-gray-800 font-sans min-h-screen flex flex-col justify-between antialiased">

    <!-- TELA DE BLOQUEIO / LOGIN / ATIVAÇÃO -->
    <div id="bloqueioAssinatura">
        <div class="max-w-sm w-full p-6 bg-slate-900 rounded-2xl border border-emerald-500/30 shadow-2xl space-y-4">
            <div id="iconBloqueio" class="text-5xl">🔐</div>
            <h1 id="tituloBloqueio" class="text-xl font-bold text-white uppercase tracking-wider">Acesso ao Sistema</h1>
            <p id="descBloqueio" class="text-sm text-gray-400">Insira suas credenciais para continuar.</p>
            
            <div id="containerForm" class="space-y-3">
                <input id="inputChaveAtivacao" type="text" placeholder="Cole sua Chave de Ativação" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-gray-700 text-sm outline-none hidden">
                <input id="inputDefinirSenha" type="password" placeholder="Defina sua Senha de Acesso" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-gray-700 text-sm outline-none hidden">
                <input id="inputSenhaLogin" type="password" placeholder="Digite sua Senha de Acesso" class="w-full p-3 rounded-lg bg-slate-800 text-white border border-gray-700 text-sm outline-none hidden">
                
                <button id="btnAcao" onclick="processarAcesso()" class="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-bold py-3 rounded-lg transition-all">Entrar</button>
            </div>
            <p id="msgRodape" class="text-[10px] text-gray-500">Sistema Seguro ZapFácil.</p>
        </div>
    </div>

    <header class="bg-emerald-600 text-white shadow-md py-3.5 px-4 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex justify-between items-center">
            <h1 class="text-lg font-bold">💼 ZapFácil ERP</h1>
            <span class="text-[10px] bg-emerald-500 px-2 py-0.5 rounded-full font-bold uppercase">PREMIUM</span>
        </div>
    </header>

    <main class="max-w-7xl mx-auto p-4 lg:col-span-12 w-full flex-grow">
        <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
            <h2 class="text-xl font-bold mb-4">Bem-vindo ao Painel</h2>
            <p class="text-gray-600">Sistema liberado e operando corretamente.</p>
        </div>
    </main>

    <script>
        function verificarEstado() {
            const ehAtivado = localStorage.getItem('zap_ativado') === "true";
            const sessaoAtiva = sessionStorage.getItem('zap_sessao_ativa') === "true";
            
            const tela = document.getElementById('bloqueioAssinatura');
            const inputChave = document.getElementById('inputChaveAtivacao');
            const inputDefinir = document.getElementById('inputDefinirSenha');
            const inputLogin = document.getElementById('inputSenhaLogin');
            const btn = document.getElementById('btnAcao');
            const titulo = document.getElementById('tituloBloqueio');
            const desc = document.getElementById('descBloqueio');

            if (!ehAtivado) {
                tela.style.display = "flex";
                titulo.innerText = "Ativação do Sistema";
                desc.innerText = "Insira a chave recebida e crie uma senha para seu uso pessoal.";
                inputChave.classList.remove('hidden');
                inputDefinir.classList.remove('hidden');
                inputLogin.classList.add('hidden');
                btn.innerText = "Ativar e Acessar";
            } else if (!sessaoAtiva) {
                tela.style.display = "flex";
                titulo.innerText = "Login de Acesso";
                desc.innerText = "Bem-vindo de volta! Digite sua senha.";
                inputChave.classList.add('hidden');
                inputDefinir.classList.add('hidden');
                inputLogin.classList.remove('hidden');
                btn.innerText = "Entrar no Sistema";
            } else {
                tela.style.display = "none";
            }
        }

        function processarAcesso() {
            const ehAtivado = localStorage.getItem('zap_ativado') === "true";

            if (!ehAtivado) {
                const chave = document.getElementById('inputChaveAtivacao').value.trim();
                const senha = document.getElementById('inputDefinirSenha').value.trim();

                if (!chave || !senha) return alert("Preencha a chave e a senha!");
                
                try {
                    // Decodifica a chave para verificar se é válida
                    const decodificada = atob(chave); 
                    
                    if (decodificada.startsWith("ZAPFACIL-")) {
                        localStorage.setItem('zap_ativado', "true");
                        localStorage.setItem('zap_senha_acesso', senha);
                        sessionStorage.setItem('zap_sessao_ativa', 'true');
                        location.reload();
                    } else {
                        alert("Chave de ativação inválida ou formatada incorretamente.");
                    }
                } catch (e) {
                    alert("Erro: A chave fornecida não está em um formato válido.");
                }

            } else {
                const senhaDigitada = document.getElementById('inputSenhaLogin').value.trim();
                const senhaCorreta = localStorage.getItem('zap_senha_acesso');

                if (senhaDigitada === senhaCorreta) {
                    sessionStorage.setItem('zap_sessao_ativa', 'true');
                    location.reload();
                } else {
                    alert("Senha incorreta!");
                }
            }
        }

        window.onload = verificarEstado;
    </script>
</body>
</html>
