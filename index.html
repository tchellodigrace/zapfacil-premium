<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZapFácil Pro | Login</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        body { background-color: #f1f5f9; color: #334155; height: 100vh; display: flex; justify-content: center; align-items: center; }

        /* CARD DE LOGIN (LIMPO) */
        .card {
            background-color: #ffffff;
            border: 1px solid #e2e8f0;
            padding: 40px;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.1);
        }
        .logo-login { max-width: 220px; margin-bottom: 25px; }
        
        .form-group { text-align: left; margin-bottom: 15px; }
        .form-group label { font-size: 12px; font-weight: bold; color: #64748b; margin-bottom: 5px; display: block; text-transform: uppercase; }
        
        .input-field {
            width: 100%;
            padding: 12px;
            border: 1px solid #cbd5e1;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 14px;
        }
        
        .btn-login {
            width: 100%;
            padding: 14px;
            background-color: #059669;
            color: white;
            border: none;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            text-transform: uppercase;
        }
        .btn-login:hover { background-color: #047857; }
    </style>
</head>
<body>

    <div class="card">
        <img src="pro sem fundo.png" alt="ZapFácil Pro" class="logo-login">
        
        <div class="form-group">
            <label>Chave de Ativação</label>
            <input type="text" class="input-field" placeholder="Insira a chave...">
        </div>
        
        <div class="form-group">
            <label>Senha</label>
            <input type="password" class="input-field" placeholder="Sua senha...">
        </div>

        <button class="btn-login">ACESSAR SISTEMA</button>
    </div>

</body>
</html>
